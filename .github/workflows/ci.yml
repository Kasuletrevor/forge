name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  workspace:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            apps/desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix apps/desktop

      - name: Verify desktop version sync
        run: npm run verify:version --prefix apps/desktop

      - name: Run Rust tests
        run: cargo test -p app -p api -p forge -p forged

      - name: Check desktop crate
        run: cargo check -p forge-desktop

      - name: Run frontend tests
        run: npm test --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  desktop-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            apps/desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix apps/desktop

      - name: Verify desktop version sync
        run: npm run verify:version --prefix apps/desktop

      - name: Build Forge daemon release binary
        run: cargo build -p forged --release --target x86_64-pc-windows-msvc

      - name: Check desktop crate
        run: cargo check -p forge-desktop
