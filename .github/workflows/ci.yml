name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  workspace:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            apps/desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix apps/desktop

      - name: Verify desktop version sync
        run: npm run verify:version --prefix apps/desktop

      - name: Run Rust tests
        run: cargo test -p app -p api -p forge -p forged

      - name: Check desktop crate
        run: cargo check -p forge-desktop

      - name: Run frontend tests
        run: npm test --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  desktop-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            apps/desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix apps/desktop

      - name: Verify desktop version sync
        run: npm run verify:version --prefix apps/desktop

      - name: Build Forge CLI and daemon release binaries
        run: |
          cargo build -p forge --release --target x86_64-pc-windows-msvc
          cargo build -p forged --release --target x86_64-pc-windows-msvc

      - name: Stage desktop sidecar and CLI resources
        run: node apps/desktop/scripts/stage-sidecar.mjs

      - name: Check desktop crate
        run: cargo check -p forge-desktop
