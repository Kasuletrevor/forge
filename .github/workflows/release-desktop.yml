name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub Release for release_tag."
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Existing semver tag to publish, for example v0.1.0."
        required: false
        default: ""
        type: string

env:
  CARGO_TERM_COLOR: always
  FORGE_SIDECAR_TARGET: x86_64-pc-windows-msvc
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag-check:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
      should_publish: ${{ steps.meta.outputs.should_publish }}

    steps:
      - uses: actions/checkout@v5

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./apps/desktop/package.json').version")"
          release_tag="v${version}"
          should_publish=false

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            should_publish=true
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.publish_release }}" == "true" ]]; then
            release_tag="${{ inputs.release_tag }}"
            should_publish=true
          fi

          if [[ -z "${release_tag}" ]]; then
            echo "release_tag is required when publishing from workflow_dispatch."
            exit 1
          fi

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag ${release_tag} is not a supported semver tag."
            exit 1
          fi

          tag="${release_tag#v}"
          if [[ "${tag}" != "${version}" ]]; then
            echo "Tag ${release_tag} does not match Forge version ${version}"
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${tag}" >> "${GITHUB_OUTPUT}"
          echo "should_publish=${should_publish}" >> "${GITHUB_OUTPUT}"

  build-windows:
    runs-on: windows-latest
    needs: tag-check
    if: ${{ always() && needs.tag-check.result == 'success' }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            apps/desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix apps/desktop

      - name: Verify desktop version sync
        run: npm run verify:version --prefix apps/desktop

      - name: Build desktop release assets
        run: npm run build:release --prefix apps/desktop
        env:
          FORGE_RELEASE_VERSION: ${{ needs.tag-check.outputs.release_version }}

      - name: Smoke packaged desktop startup
        shell: powershell
        run: |
          $healthUrl = "http://127.0.0.1:37241/health"
          $desktopCandidates = @(
            (Join-Path $PWD "target\release\Forge.exe"),
            (Join-Path $PWD "target\release\forge-desktop.exe"),
            (Join-Path $PWD "apps\desktop\src-tauri\target\release\Forge.exe"),
            (Join-Path $PWD "apps\desktop\src-tauri\target\release\forge-desktop.exe")
          )
          $desktopExe = $desktopCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $desktopExe) {
            throw "Unable to locate Forge desktop executable for smoke test."
          }

          Get-Process forge-desktop,Forge,forged -ErrorAction SilentlyContinue | Stop-Process -Force

          $desktop = Start-Process -FilePath $desktopExe -PassThru
          $ready = $false

          try {
            $deadline = (Get-Date).AddSeconds(45)
            while ((Get-Date) -lt $deadline) {
              Start-Sleep -Milliseconds 500
              try {
                $response = Invoke-RestMethod -Uri $healthUrl -TimeoutSec 2
                if ($response.status -eq "ok") {
                  $ready = $true
                  break
                }
              } catch {
              }
            }

            if (-not $ready) {
              throw "Forge desktop smoke test did not reach a healthy daemon."
            }
          } finally {
            if ($desktop -and -not $desktop.HasExited) {
              Stop-Process -Id $desktop.Id -Force
            }
            Get-Process forged -ErrorAction SilentlyContinue | Stop-Process -Force
          }

      - name: Smoke standalone CLI install
        shell: powershell
        run: |
          $cliZip = Join-Path $PWD "apps\desktop\dist\release\forge-v${{ needs.tag-check.outputs.release_version }}-windows-x64-cli.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "forge-cli"
          $installRoot = Join-Path $env:LOCALAPPDATA "Programs\Forge\bin"
          $userPath = [Environment]::GetEnvironmentVariable("Path", "User")

          Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
          Expand-Archive -Path $cliZip -DestinationPath $extractDir -Force
          & (Join-Path $extractDir "install-cli.ps1")

          if (-not (Test-Path (Join-Path $installRoot "forge.exe"))) {
            throw "CLI installer did not place forge.exe in $installRoot"
          }

          if (-not (($userPath = [Environment]::GetEnvironmentVariable("Path", "User")) -split ";" | Where-Object { $_ -eq $installRoot })) {
            throw "Forge CLI install root was not added to the user PATH"
          }

          $env:Path = "$([Environment]::GetEnvironmentVariable('Path', 'User'));$([Environment]::GetEnvironmentVariable('Path', 'Machine'))"
          $version = & forge --version
          if ($version -notmatch "^forge ") {
            throw "Expected forge --version to succeed after CLI install, got: $version"
          }

          $today = & forge today
          if ($today -notmatch "^Today ") {
            throw "Expected forge today to succeed after CLI install, got: $today"
          }

          $doctor = (& forge doctor) -join "`n"
          if ($doctor -notmatch "(?m)^Forge Environment Check$") {
            throw "Expected forge doctor to succeed after CLI install, got: $doctor"
          }

          Get-Process forged -ErrorAction SilentlyContinue | Stop-Process -Force
          & (Join-Path $extractDir "uninstall-cli.ps1")

      - name: Smoke desktop installer CLI integration
        shell: powershell
        run: |
          $installer = Join-Path $PWD "apps\desktop\dist\release\forge-v${{ needs.tag-check.outputs.release_version }}-windows-x64-setup.exe"
          $installRoot = Join-Path $env:LOCALAPPDATA "Programs\Forge\bin"

          Get-Process forge-desktop,Forge,forged -ErrorAction SilentlyContinue | Stop-Process -Force
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait

          if (-not (Test-Path (Join-Path $installRoot "forge.exe"))) {
            throw "Desktop installer did not provision forge.exe in $installRoot"
          }

          if (-not (([Environment]::GetEnvironmentVariable("Path", "User")) -split ";" | Where-Object { $_ -eq $installRoot })) {
            throw "Desktop installer did not add the Forge CLI path to the user PATH"
          }

          $env:Path = "$([Environment]::GetEnvironmentVariable('Path', 'User'));$([Environment]::GetEnvironmentVariable('Path', 'Machine'))"
          $version = & forge --version
          if ($version -notmatch "^forge ") {
            throw "Expected forge --version after desktop install, got: $version"
          }

          $doctor = (& forge doctor) -join "`n"
          if ($doctor -notmatch "(?m)^Forge Environment Check$") {
            throw "Expected forge doctor after desktop install, got: $doctor"
          }

      - name: Generate checksums
        shell: powershell
        run: |
          $releaseDir = Join-Path $PWD "apps\desktop\dist\release"
          $lines = Get-ChildItem $releaseDir -File | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          }
          Set-Content -Path (Join-Path $releaseDir "SHA256SUMS.txt") -Value $lines

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: forge-desktop-windows-x64
          path: apps/desktop/dist/release/*
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - tag-check
      - build-windows
    if: needs.tag-check.outputs.should_publish == 'true' && needs.build-windows.result == 'success'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: forge-desktop-windows-x64
          path: dist

      - name: Prepare changelog release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.tag-check.outputs.release_version }}"
          notes_file="$(mktemp)"
          awk -v version="${version}" '
            $0 ~ "^## \\[" version "\\]" { capture = 1 }
            capture && $0 ~ "^## \\[" version "\\]" { print; next }
            capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" { exit }
            capture { print }
          ' CHANGELOG.md > "${notes_file}"

          if [[ ! -s "${notes_file}" ]]; then
            echo "Failed to locate changelog entry for ${version} in CHANGELOG.md"
            exit 1
          fi

          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ needs.tag-check.outputs.release_tag }}"
          version="${{ needs.tag-check.outputs.release_version }}"
          prerelease=false
          if [[ "${version}" == *-* ]]; then
            prerelease=true
          fi

          mapfile -t assets < <(find dist -maxdepth 1 -type f | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets found in dist/"
            exit 1
          fi

          if gh release view "${release_tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" "${assets[@]}" --repo "${GH_REPO}" --clobber
            exit 0
          fi

          args=(
            release
            create
            "${release_tag}"
            --repo
            "${GH_REPO}"
            --title
            "Forge ${version}"
            --notes-file
            "${{ steps.notes.outputs.notes_file }}"
          )

          if [[ "${prerelease}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}" "${assets[@]}"
